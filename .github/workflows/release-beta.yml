name: release-beta

on:
  push:
    tags:
      - 'v*.*.*-beta.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Beta tag to publish (for example: v1.2.3-beta.1)"
        required: true
        type: string

concurrency:
  group: release-beta-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-beta:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag='${{ inputs.tag }}'
          else
            tag='${{ github.ref_name }}'
          fi

          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "invalid beta tag format: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.meta.outputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true

      - run: go mod download

      - name: Run beta gate and evidence capture
        shell: bash
        run: |
          set -euo pipefail
          make beta-check
          make release-evidence-beta

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.tag }}'
          commit="$(git rev-parse HEAD)"
          date="$(git log -1 --format=%cI)"
          out_dir="$GITHUB_WORKSPACE/dist/$tag"
          ./scripts/build-release-assets.sh "$out_dir" "$tag" "$commit" "$date"

      - name: Upload release assets artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: beta-release-assets-${{ steps.meta.outputs.tag }}
          path: dist/${{ steps.meta.outputs.tag }}/
          if-no-files-found: error

      - name: Upload beta evidence artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: beta-release-evidence-${{ steps.meta.outputs.tag }}
          path: |
            releases/evidence/*.md
            releases/evidence/logs/*.log
          if-no-files-found: error

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.tag }}'
          out_dir="$GITHUB_WORKSPACE/dist/$tag"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --prerelease --latest=false --title "$tag"
            gh release upload "$tag" "$out_dir"/* --clobber
          else
            gh release create "$tag" "$out_dir"/* \
              --title "$tag" \
              --generate-notes \
              --prerelease \
              --latest=false
          fi
